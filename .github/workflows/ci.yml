# Required checks for every PR (D-13). This file is push-ruleset protected:
# agents cannot modify it, even on feature branches.
name: ci

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Lint (syntax gate)
        run: npm run lint
      - name: Unit tests (hooks + emitter)
        run: npm test

  test-ownership:
    # D-4 server-side half: test paths may only change when the PR carries the
    # tests-approved label (applied by a human or the test-writer pipeline).
    # Local hooks are UX; this check is the law.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check test-path changes are authorized
        env:
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'tests-approved') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD | grep -E '(^|/)tests?/|\.(test|spec)\.[jt]sx?$|_test\.py$' || true)
          if [ -n "$CHANGED" ] && [ "$HAS_LABEL" != "true" ]; then
            echo "::error::Test files changed without the 'tests-approved' label:"
            echo "$CHANGED"
            exit 1
          fi
          echo "OK: $([ -n "$CHANGED" ] && echo 'test changes are labeled' || echo 'no test-path changes')"
