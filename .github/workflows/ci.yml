# Required checks for every PR (D-13). Integrity note: a same-repo PR could
# modify this file and have the modified version run — that is why the `guard`
# workflow (pull_request_target, runs the BASE version) separately fails any PR
# touching .github/** without the harness-config-approved label. Gates can be
# edited, but never silently.
name: ci

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Lint (syntax gate)
        run: npm run lint
      - name: Unit tests (hooks + emitter)
        run: npm test
# tamper
