# Per-PR security scanning (CHG-0023/CHG-0024, spec: security-scanning).
# Thin caller of the reusable workflow — the same code path consumer repos
# use, so this repo dogfoods it. Check contexts are nested:
# "security / semgrep|gitleaks|trivy" (required in the main-protection
# ruleset). Same integrity note as ci.yml: the guard workflow fails any PR
# touching .github/** without the harness-config-approved label.
name: security

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  security:
    uses: ./.github/workflows/security-reusable.yml
    with:
      # This repo's deps are all devDependencies and they run in CI —
      # without this the npm vuln scan sees zero packages.
      include-dev-deps: true
